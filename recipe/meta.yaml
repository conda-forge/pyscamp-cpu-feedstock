{% set name = "pyscamp" %}
{% set version = "4.0.2dev0" %}

package:
  name: {{ name|lower }}-cpu
  version: {{ version }}

source:
  # Testing SCAMP PR #136 (fix/python-3.13-numpy-2-compat)
  # Switch back to a PyPI url + sha256 once v4.0.2 is released.
  git_url: https://github.com/zpzim/SCAMP
  git_rev: 3d391097e5bfc9c362e31db0cecf7070a3965c00

build:
  number: 0

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - cmake
    - make  # [not win]

  host:
    - python
    - setuptools >=70
    - setuptools-scm
    - pybind11 >=2.13.6
    - eigen 3.4.0

  run:
    - python

test:
  source_files:
    - test
  imports:
    - pyscamp
  commands:
    - pip check
    - cd test
    - python test_pyscamp.py
  requires:
    - pip
    - numpy

about:
  home: https://github.com/zpzim/SCAMP
  summary: SCAlable Matrix Profile
  license: MIT
  license_file:
    - LICENSE
    - third_party/cpu_features/LICENSE

extra:
  recipe-maintainers:
    - zpzim
